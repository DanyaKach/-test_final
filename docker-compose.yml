version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: weatherstation-postgres
    environment:
      POSTGRES_DB: weatherstation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weatherstation-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=weatherstation;Username=postgres;Password=postgres"
    ports:
      - "5000:5000"
      - "5001:5001"
    command: >
      sh -c "dotnet WeatherStation.Api.dll --seed"

volumes:
  postgres_data:
